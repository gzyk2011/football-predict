name: Daily Predictions Update

on:
  schedule:
    # 每天的 UTC 时间 08:00 (北京时间下午 16:00) 自动运行
    - cron: '0 8 * * *'
  workflow_dispatch:  # 允许在网页上手动点击运行

permissions:
  contents: write  # 允许机器人推送代码修改

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run predictions with odds and PushPlus
        env:
          # 换成了最新的 API-Football 和 PushPlus 密钥
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          echo "PYTHONPATH is: $PYTHONPATH"
          echo "Working directory is: $(pwd)"
          ls -la src/data/
          
          # === 新增这一行：让机器人在预测前，先花点时间把模型训练出来 ===
          python main.py --train
          
          # 可以在这里把你关心的联赛全加上，比如 PL,SA,PD,UCL,J1
          python main.py --predict --odds --leagues PL,SA,PD,BL1,FL1,UCL --days 7
      
      - name: Generate HTML page
        run: |
          python generate_html.py
      
      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add index.html data/value_bets_*.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update predictions $(date +%Y-%m-%d)" && git push)

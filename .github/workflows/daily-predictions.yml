name: Daily Predictions Update

on:
  schedule:
    # 每天的 UTC 时间 08:00 (北京时间下午 16:00) 自动运行
    - cron: '0 8 * * *'
  workflow_dispatch:  # 允许在网页上手动点击运行

permissions:
  contents: write  # 允许机器人推送代码修改

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run predictions with odds and PushPlus
        env:
          # 换成了最新的 API-Football 和 PushPlus 密钥
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          echo "PYTHONPATH is: $PYTHONPATH"
          echo "Working directory is: $(pwd)"
          ls -la src/data/
          
          # === 第一步：让机器人尝试训练（如果 src/models 已有模型，会自动跳过） ===
          python main.py --train
          
          # === 第二步：执行预测并发送推送（这里建议把 leagues 参数写全，或者保持原样） ===
          python main.py --predict --odds --leagues PL,SA,PD,BL1,FL1,UCL --days 3
      
      - name: Generate HTML page
        run: |
          python generate_html.py
      
      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 【核心修改】：明确告诉 Git 要把 src/models/ 里的模型文件也带上
          git add index.html data/*.csv src/models/*.joblib
          
          # 检查是否有变化并提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自动更新预测结果并保存永久模型 $(date +%Y-%m-%d)" && git push)
